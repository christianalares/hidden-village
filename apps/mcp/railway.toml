[build]
builder = "RAILPACK"
buildCommand = "pnpm --filter @hidden-village/mcp build"
watchPatterns = [
  "/apps/mcp/**",
  "/packages/db/**",
  "/packages/finance/**",
  "/package.json",
  "/pnpm-lock.yaml",
  "/pnpm-workspace.yaml",
]

[deploy]
startCommand = "pnpm --filter @hidden-village/mcp start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
